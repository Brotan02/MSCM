<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Загрузка плаща</title>

<link rel="stylesheet" href="style.css">

<style>

.upload-box{
max-width:700px;
margin:auto;
text-align:center;
padding:30px;
}

.preview{
width:200px;
height:200px;
object-fit:contain;
margin:20px;
border-radius:15px;
}

</style>

</head>
<body>

<div class="container">

<div class="upload-box">

<h1>🧥 Загрузка плаща</h1>

<img
id="preview"
class="preview"
src="https://via.placeholder.com/200">

<br>

<input
type="file"
id="capeFile"
accept=".png">

<br><br>

<button onclick="uploadCape()">

💾 Сохранить плащ

</button>

<br><br>

<p id="msg"></p>

<br>

<button
onclick="location.href='dashboard.html'">

⬅ Главное меню

</button>

</div>

</div>

<script>

const fileInput =
document.getElementById("capeFile")

fileInput.addEventListener("change",(e)=>{

const file =
e.target.files[0]

if(!file)return

document.getElementById("preview")
.src =
URL.createObjectURL(file)

})

async function uploadCape(){

const file =
fileInput.files[0]

if(!file){

alert("Выберите PNG файл")

return

}

const formData =
new FormData()

formData.append(
"username",
localStorage.getItem("username")
)

formData.append(
"cape",
file
)

const response =
await fetch(
"/api/upload-cape",
{
method:"POST",
body:formData
}
)

const data =
await response.json()

document.getElementById("msg")
.innerText =
data.message

}

</script>

</body>
</html>
