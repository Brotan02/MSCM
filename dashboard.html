<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Brotan02 Skin Server</title>

<link rel="stylesheet" href="style.css">

<style>

.dashboard{
max-width:1200px;
margin:auto;
padding:30px;
text-align:center;
}

.logo{
font-size:48px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
font-size:20px;
opacity:.8;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
background:rgba(255,255,255,.15);
}

.icon{
font-size:64px;
margin-bottom:15px;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
opacity:.8;
}

.user{
margin-top:40px;
font-size:20px;
}

.logout{
margin-top:30px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="dashboard">

<div class="logo">
🎮 Brotan02 Skin Server
</div>

<div class="subtitle">
Minecraft Skin & Cape Manager
</div>

<div class="cards">

<div class="card"
onclick="location.href='profile.html'">

<div class="icon">👤</div>

<div class="title">
Профиль
</div>

<div class="desc">
Информация об аккаунте
</div>

</div>

<div class="card"
onclick="location.href='viewer.html'">

<div class="icon">🎮</div>

<div class="title">
Viewer
</div>

<div class="desc">
Просмотр 3D персонажа
</div>

</div>

<div class="card"
onclick="location.href='upload-skin.html'">

<div class="icon">🎨</div>

<div class="title">
Загрузить скин
</div>

<div class="desc">
Сменить внешний вид
</div>

</div>

<div class="card"
onclick="location.href='upload-cape.html'">

<div class="icon">🧥</div>

<div class="title">
Загрузить плащ
</div>

<div class="desc">
Установить cape
</div>

</div>

<div class="card"
onclick="location.href='editor.html'">

<div class="icon">🖌️</div>

<div class="title">
Editor
</div>

<div class="desc">
Редактировать скин
</div>

</div>

</div>

<div class="user">

Добро пожаловать,
<span id="username">
Игрок
</span>

</div>

<button
class="logout"
onclick="logout()">

🚪 Выйти

</button>

</div>

<script>

const username =
localStorage.getItem("username")

if(username){

document.getElementById("username")
.innerText = username

}

function logout(){

localStorage.clear()

window.location =
"/login.html"

}

</script>

</body>
</html>
